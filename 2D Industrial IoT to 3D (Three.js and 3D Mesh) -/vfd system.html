<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js VFD Drive - HD Display</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e272e; }
        #info {
            position: absolute; top: 20px; width: 100%; text-align: center;
            font-family: 'Segoe UI', Tahoma, sans-serif; color: white;
            font-size: 18px; pointer-events: none; text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div id="info">Interact with the Drive: Click a button!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 14);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // --- HD UPGRADE 1: Match monitor pixel density ---
        renderer.setPixelRatio(window.devicePixelRatio);
        
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- HD UPGRADE 2: Get max texture sharpness for angled viewing ---
        const maxAnisotropy = renderer.capabilities.getMaxAnisotropy();

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); 
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 15);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        const interactableObjects = [];

        // --- HD UPGRADE 3: Super-sampling multiplier ---
        // We draw the canvases 4x larger than before for crisp edges
        const resolutionMultiplier = 4; 

        function createScreenTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512 * resolutionMultiplier; 
            canvas.height = 390 * resolutionMultiplier; 
            const ctx = canvas.getContext('2d');
            
            // Scale all our drawing commands up automatically
            ctx.scale(resolutionMultiplier, resolutionMultiplier);

            // 1. Base Screen Background
            ctx.fillStyle = '#d3dce6'; 
            ctx.fillRect(0, 0, 512, 390);

            ctx.fillStyle = '#3a4a5a'; 
            ctx.strokeStyle = '#8a9ba8'; 
            ctx.lineWidth = 2;

            // --- Top Status Bar ---
            ctx.beginPath();
            ctx.moveTo(0, 40); ctx.lineTo(512, 40); 
            ctx.moveTo(100, 0); ctx.lineTo(100, 40); 
            ctx.moveTo(150, 0); ctx.lineTo(150, 40); 
            ctx.moveTo(400, 0); ctx.lineTo(400, 40); 
            ctx.stroke();

            ctx.font = '16px "Courier New", Courier, monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('RUN', 50, 20);
            
            ctx.beginPath(); ctx.arc(125, 20, 8, 0, Math.PI * 1.5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(125, 12); ctx.lineTo(120, 8); ctx.lineTo(120, 16); ctx.fill();

            ctx.fillText('READY', 275, 20);
            ctx.fillText('Keypad', 456, 20);

            // --- Middle Section ---
            ctx.font = 'bold 22px Arial';
            ctx.fillText('Keypad Reference', 256, 75);
            
            ctx.fillRect(20, 60, 10, 25); 
            ctx.beginPath(); ctx.moveTo(35, 65); ctx.lineTo(35, 75); ctx.lineTo(45, 70); ctx.fill();

            ctx.font = '14px Arial';
            ctx.fillText('ID:184', 256, 100);

            ctx.fillStyle = '#65778a'; 
            ctx.fillRect(0, 115, 512, 60);
            
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.moveTo(30, 130); ctx.lineTo(25, 140); ctx.lineTo(35, 140); ctx.fill();
            ctx.beginPath(); ctx.moveTo(30, 160); ctx.lineTo(25, 150); ctx.lineTo(35, 150); ctx.fill();

            ctx.font = '300 48px Arial';
            ctx.fillText('13.00 Hz', 256, 148);
            
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(212, 172); ctx.lineTo(258, 172); ctx.stroke();

            // --- Bottom Grid Section ---
            ctx.strokeStyle = '#8a9ba8';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 175); ctx.lineTo(512, 175); 
            ctx.moveTo(256, 175); ctx.lineTo(256, 390); 
            ctx.moveTo(0, 280); ctx.lineTo(512, 280); 
            ctx.stroke();

            ctx.fillStyle = '#3a4a5a'; 

            ctx.textAlign = 'left';
            ctx.font = 'bold 14px "Courier New", Courier, monospace';
            ctx.fillText('Output frequency', 15, 205);
            ctx.textAlign = 'right';
            ctx.font = '24px Arial';
            ctx.fillText('13.00Hz', 240, 245);

            ctx.textAlign = 'left';
            ctx.font = 'bold 14px "Courier New", Courier, monospace';
            ctx.fillText('Motor Speed', 270, 205);
            ctx.textAlign = 'right';
            ctx.font = '24px Arial';
            ctx.fillText('382rpm', 495, 245);

            ctx.textAlign = 'left';
            ctx.font = 'bold 14px "Courier New", Courier, monospace';
            ctx.fillText('Motor Voltage', 15, 310);
            ctx.textAlign = 'right';
            ctx.font = '24px Arial';
            ctx.fillText('64.3V', 240, 350);

            ctx.textAlign = 'left';
            ctx.font = 'bold 14px "Courier New", Courier, monospace';
            ctx.fillText('Motor Power', 270, 310);
            ctx.textAlign = 'right';
            ctx.font = '24px Arial';
            ctx.fillText('1.3%', 495, 350);

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = maxAnisotropy; // Apply sharpness filter
            return texture;
        }

        function createGridTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512 * resolutionMultiplier; 
            canvas.height = 512 * resolutionMultiplier;
            const ctx = canvas.getContext('2d');
            ctx.scale(resolutionMultiplier, resolutionMultiplier);

            ctx.fillStyle = '#eef0f2'; ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = '#d5d9de'; ctx.lineWidth = 4;
            for (let i = 0; i <= 512; i += 16) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 512); ctx.stroke(); 
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(512, i); ctx.stroke(); 
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 2); 
            texture.anisotropy = maxAnisotropy;
            return texture;
        }

        function createIconTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 256 * resolutionMultiplier; 
            canvas.height = 256 * resolutionMultiplier;
            const ctx = canvas.getContext('2d');
            ctx.scale(resolutionMultiplier, resolutionMultiplier);

            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

            if (type === 'back_reset') {
                ctx.fillStyle = '#3973c4'; ctx.fillRect(0, 0, 256, 256); 
                ctx.fillStyle = 'white'; ctx.font = 'bold 36px Arial'; 
                ctx.fillText('BACK', 128, 95); ctx.fillText('RESET', 128, 155);
            } else if (['up', 'down', 'left', 'right'].includes(type)) {
                ctx.fillStyle = '#f8f9fa'; ctx.fillRect(0, 0, 256, 256); 
                ctx.strokeStyle = '#5a5a5a'; ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; 
                ctx.beginPath();
                if (type === 'up') { ctx.moveTo(88, 138); ctx.lineTo(128, 98); ctx.lineTo(168, 138); }
                if (type === 'down') { ctx.moveTo(88, 118); ctx.lineTo(128, 158); ctx.lineTo(168, 118); }
                if (type === 'left') { ctx.moveTo(138, 88); ctx.lineTo(98, 128); ctx.lineTo(138, 168); }
                if (type === 'right') { ctx.moveTo(118, 88); ctx.lineTo(158, 128); ctx.lineTo(118, 168); }
                ctx.stroke();
            } else if (type === 'funct') {
                ctx.fillStyle = '#3973c4'; ctx.fillRect(0, 0, 256, 256);
                ctx.fillStyle = 'white'; ctx.font = 'bold 38px Arial'; ctx.fillText('FUNCT', 128, 128);
            } else if (type === 'ok') {
                ctx.fillStyle = '#3973c4'; ctx.fillRect(0, 0, 256, 256);
                ctx.fillStyle = 'white'; ctx.font = 'bold 76px Arial'; ctx.fillText('OK', 128, 128);
            } else if (type === 'stop') {
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 256, 256); 
                ctx.fillStyle = '#ff4d4d'; ctx.beginPath(); ctx.arc(128, 128, 110, 0, Math.PI*2); ctx.fill(); 
                ctx.strokeStyle = 'white'; ctx.lineWidth = 15; ctx.lineJoin = 'round';
                ctx.beginPath(); ctx.moveTo(70, 90); ctx.lineTo(186, 90); ctx.lineTo(128, 180); ctx.closePath(); ctx.stroke();
            } else if (type === 'start') {
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 256, 256);
                ctx.fillStyle = '#4eaf51'; 
                ctx.save(); ctx.translate(128, 128); ctx.rotate(-((Math.PI / 4) + (Math.PI / 2))); 
                ctx.fillRect(-100, -100, 200, 200); 
                ctx.fillStyle = 'white'; ctx.fillRect(-13, -63, 26, 126); ctx.restore(); 
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = maxAnisotropy; // Apply sharpness filter
            return texture;
        }

        const deviceGroup = new THREE.Group(); 
        scene.add(deviceGroup);

        const bodyGeo = new THREE.BoxGeometry(5.0, 9, 2); 
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.receiveShadow = true;
        deviceGroup.add(body);

        const screenGeo = new THREE.BoxGeometry(4.2, 3.2, 0.2);
        const screenMat = new THREE.MeshStandardMaterial({ 
            map: createScreenTexture(), 
            roughness: 0.3, 
            metalness: 0.1,
            emissive: 0x222222 
        }); 
        const screen = new THREE.Mesh(screenGeo, screenMat);
        screen.position.set(0, 2.2, 1.05); 
        body.add(screen);

        const panelGeo = new THREE.BoxGeometry(4.6, 4.2, 0.1);
        const panelMat = new THREE.MeshStandardMaterial({ color: 0x28599e, roughness: 0.6 }); 
        const panel = new THREE.Mesh(panelGeo, panelMat);
        panel.position.set(0, -1.8, 1.05);
        panel.receiveShadow = true;
        body.add(panel);

        const dpadBgGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.05, 64);
        dpadBgGeo.rotateX(Math.PI / 2); 
        const dpadBgMat = new THREE.MeshStandardMaterial({ map: createGridTexture(), roughness: 0.9 });
        const dpadBg = new THREE.Mesh(dpadBgGeo, dpadBgMat);
        dpadBg.position.set(0, 0.2, 0.06);
        dpadBg.receiveShadow = true;
        panel.add(dpadBg);

        function createButton(type, shape, x, y, width, height, name) {
            let geometry;
            if (shape === 'box') geometry = new THREE.BoxGeometry(width, height, 0.2);
            else if (shape === 'cylinder') { geometry = new THREE.CylinderGeometry(width, width, 0.2, 64); geometry.rotateX(Math.PI / 2); }
            else if (shape === 'diamond') { geometry = new THREE.CylinderGeometry(width, width, 0.2, 4); geometry.rotateX(Math.PI / 2); }

            const texture = createIconTexture(type); 
            const rubberSettings = { roughness: 0.95, metalness: 0.05 };
            const sideMat = new THREE.MeshStandardMaterial({ color: 0x777777, ...rubberSettings }); 
            const faceMat = new THREE.MeshStandardMaterial({ map: texture, ...rubberSettings });

            let materials = (shape === 'box') ? [sideMat, sideMat, sideMat, sideMat, faceMat, sideMat] : [sideMat, faceMat, sideMat];                           
            const btn = new THREE.Mesh(geometry, materials);
            btn.position.set(x, y, 0.15); 
            btn.castShadow = true; btn.receiveShadow = true;
            if (shape === 'cylinder') { btn.rotation.z = Math.PI / 2; }

            btn.name = name; panel.add(btn); interactableObjects.push(btn); 
            return btn; 
        }

        createButton('back_reset', 'box', -1.7, 1.45, 0.85, 0.65, "Back / Reset"); 
        createButton('funct', 'box', 1.7, 1.45, 0.85, 0.65, "Function");
        
        createButton('up', 'cylinder', 0, 1.1, 0.38, 0, "Up Arrow");
        createButton('down', 'cylinder', 0, -0.7, 0.38, 0, "Down Arrow");
        createButton('left', 'cylinder', -0.9, 0.2, 0.38, 0, "Left Arrow");
        createButton('right', 'cylinder', 0.9, 0.2, 0.38, 0, "Right Arrow");
        createButton('ok', 'cylinder', 0, 0.2, 0.45, 0, "OK Button");
        
        createButton('stop', 'cylinder', -1.7, -1.3, 0.45, 0, "Stop (Red)");
        const startBtn = createButton('start', 'diamond', 1.7, -1.3, 0.55, 0, "Start (Green)");
        startBtn.rotation.z = (Math.PI / 4) + (Math.PI / 2); 

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableObjects);

            if (intersects.length > 0) {
                const clickedObject = intersects[0].object; 
                document.getElementById('info').innerText = `Pressed: ${clickedObject.name}`;
                
                clickedObject.position.z -= 0.08;
                setTimeout(() => clickedObject.position.z += 0.08, 150); 
                
                if (clickedObject.name.includes("Stop")) {
                    screen.material.emissive.setHex(0x000000); 
                } else if (clickedObject.name.includes("Start")) {
                    screen.material.emissive.setHex(0x222222); 
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }, false);

        function animate() {
            requestAnimationFrame(animate); 
            controls.update(); 
            renderer.render(scene, camera); 
        }

        animate(); 
    </script>
</body>
</html>
